<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – Success Payment</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body x-data="{ open: false }" class="bg-white text-gray-800 font-sans">

  <!-- Mobile Burger Menu -->
  <div class="relative z-50">
    <button @click="open = !open"
      class="fixed top-6 right-6 z-50 bg-white p-2 rounded-md shadow-md focus:outline-none">
      <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div x-show="open" @click.away="open = false" x-transition
      class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg flex flex-col pt-20 px-6 space-y-6">
      <a href="index.html" class="text-lg font-semibold text-gray-800 hover:text-yellow-500 transition">Home</a>
      <a href="contact.html" class="text-lg font-semibold text-gray-800 hover:text-yellow-500 transition">Contact</a>
      <a href="signin.html" class="text-lg font-semibold text-gray-800 hover:text-yellow-500 transition">Sign In</a>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-white shadow-md py-6 px-10 flex items-center justify-between">
    <img src="images/logo.png" alt="Logo" class="h-48 w-auto">
  </header>

  <!-- Contact Info with Image -->
  <section class="max-w-6xl mx-auto py-20 px-6 flex flex-col md:flex-row items-center gap-10">
    <!-- Left Image -->
    <div class="w-full md:w-1/2">
      <img src="images/ContactSocialNetwork.jpg" alt="Social Contact Icons" class="rounded-xl shadow-lg object-cover w-full h-auto max-h-[400px]" />
    </div>

    <!-- Contact Details -->
    <div class="w-full md:w-1/2 text-center md:text-left">
      <h1 class="text-4xl font-bold text-brand-blue mb-6">Contact Us</h1>
      <p class="text-lg text-gray-700 mb-4">Have a question or want to order your payment terminal?</p>
      <p class="text-lg text-gray-700 mb-2">
        Email us at: 
        <a href="mailto:info@success-payment.com" class="text-brand-blue underline">info@success-payment.com</a>
      </p>
      <p class="text-lg text-gray-700 mb-8">Or reach out instantly via WhatsApp:</p>

      <a href="https://wa.me/352621966271" target="_blank" class="inline-block bg-brand-blue hover:bg-brand-blue text-white text-lg font-semibold px-6 py-3 rounded-full shadow-md transition flex items-center justify-center gap-2">
        Chat with Us on WhatsApp
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-brand-blue text-white py-8 text-center">
    <img src="images/logo.png" alt="Logo" class="h-24 mx-auto mb-4" />
    <p class="text-sm">&copy; 2025 Success Payment. All rights reserved.</p>
  </footer>

  <style>
    .text-brand-blue { color: #00074F; }
    .bg-brand-blue { background-color: #00074F; }
    .bg-gold { background-color: #D4AF37; }
    .text-gold { color: #D4AF37; }
  </style>
</body>
</html>

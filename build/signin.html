<!DOCTYPE html>
<html lang="en" x-data="{ open: false }" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
  // Your Firebase project config (replace with your actual config)
    const firebaseConfig = {
      apiKey: "AIzaSyCjmJg2MXnlUmNg1U0m2NvlaPnVPctGCoI",
      authDomain: "success-payment-dashboard.firebaseapp.com",
      projectId: "success-payment-dashboard",
      storageBucket: "success-payment-dashboard.firebasestorage.app",
      messagingSenderId: "635643668373",
      appId: "1:635643668373:web:e519559793ec93af03389c"
};


  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
</script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js for burger menu -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    .background {
      background-image: url('images/dashboard.png');
      background-size: cover;
      background-position: center;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      z-index: -1;
      filter: brightness(0.6);
    }
  </style>
</head>
<body class="h-full relative">

  <!-- Mobile Burger Menu -->
  <div class="relative z-50">
    <button @click="open = !open"
      class="fixed top-6 right-6 z-50 bg-white p-2 rounded-md shadow-md focus:outline-none">
      <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div x-show="open" @click.away="open = false" x-transition
      class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg flex flex-col pt-20 px-6 space-y-6">
      <a href="index.html" class="text-lg font-semibold text-gray-800 hover:text-yellow-500 transition">Home</a>
      <a href="contact.html" class="text-lg font-semibold text-gray-800 hover:text-yellow-500 transition">Contact</a>
      <a href="signin.html" class="text-lg font-semibold text-gray-800 hover:text-yellow-500 transition">Sign In</a>
    </div>
  </div>

  <!-- Background -->
  <div class="background"></div>

  <!-- Sign In Form -->
  <div class="flex items-center justify-center h-full px-4">
    <div class="bg-white bg-opacity-90 p-8 rounded-xl shadow-lg max-w-md w-full z-10 mt-20">
      <h2 class="text-2xl font-semibold mb-6 text-center">Sign In</h2>
      <form id="loginForm" class="space-y-4">
        <input type="email" id="email" placeholder="Email" required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring focus:border-blue-400" />
        <input type="password" id="password" placeholder="Password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring focus:border-blue-400" />
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md transition">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Your Firebase login script can go here -->
    <script>
     document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
       const email = document.getElementById('email').value;
       const password = document.getElementById('password').value;

        try {
          const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
          console.log('Logged in:', userCredential.user);
         window.location.href = "https://dashboard.success-payment.com"; // or wherever your dashboard lives
       } catch (error) {
         alert("Login failed: " + error.message);
       }
     });
    </script>

</body>
</html>
